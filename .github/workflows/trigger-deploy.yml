name: Trigger Deploy

on:
  push:
    branches: [main]

jobs:
  trigger:
    name: Notify audit-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository: AndersonKouadio/audit-deploy
          event-type: deploy-backend
